<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>💕 我们的小世界</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');

  :root {
    --primary: #e8607c;
    --primary-light: #f7a8b8;
    --primary-dark: #c94060;
    --bg: #fdf2f4;
    --card: #ffffff;
    --text: #4a3040;
    --text-light: #8a7080;
    --gold: #d4a574;
    --gold-light: #f0d4b0;
    --shadow: 0 8px 32px rgba(232, 96, 124, 0.12);
    --radius: 20px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Serif SC', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* === 粒子背景 === */
  #particles {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  .particle {
    position: absolute;
    font-size: 16px;
    opacity: 0.15;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.15; }
    90% { opacity: 0.15; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  /* === 主页 === */
  .home {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 20px;
  }

  .home-icon {
    font-size: 72px;
    animation: heartbeat 1.5s ease-in-out infinite;
    margin-bottom: 16px;
  }
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    15% { transform: scale(1.15); }
    30% { transform: scale(1); }
    45% { transform: scale(1.08); }
  }

  .home-title {
    font-size: 32px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--primary), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }

  .home-subtitle {
    color: var(--text-light);
    font-size: 15px;
    margin-bottom: 48px;
    text-align: center;
  }

  .menu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    width: 100%;
    max-width: 360px;
  }

  .menu-item {
    background: var(--card);
    border-radius: var(--radius);
    padding: 28px 16px;
    text-align: center;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    border: 2px solid transparent;
    user-select: none;
  }
  .menu-item:active {
    transform: scale(0.95);
  }
  .menu-item:hover {
    border-color: var(--primary-light);
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(232, 96, 124, 0.2);
  }

  .menu-item .icon {
    font-size: 40px;
    margin-bottom: 10px;
    display: block;
  }
  .menu-item .label {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }
  .menu-item .desc {
    font-size: 12px;
    color: var(--text-light);
    margin-top: 4px;
  }

  /* === 通用页面结构 === */
  .page {
    display: none;
    position: relative;
    z-index: 1;
    min-height: 100vh;
    padding: 20px;
    padding-top: 60px;
    padding-bottom: 40px;
    max-width: 480px;
    margin: 0 auto;
  }
  .page.active { display: block; }

  .page-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }

  .back-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    background: var(--card);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .back-btn:active { transform: scale(0.9); }

  .page-title {
    font-size: 22px;
    font-weight: 700;
  }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
  }

  /* === 按钮 === */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 28px;
    border-radius: 14px;
    border: none;
    font-family: inherit;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    width: 100%;
  }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;
    box-shadow: 0 4px 16px rgba(232, 96, 124, 0.35);
  }
  .btn-primary:hover {
    box-shadow: 0 6px 24px rgba(232, 96, 124, 0.45);
  }

  .btn-gold {
    background: linear-gradient(135deg, var(--gold), #c09060);
    color: white;
    box-shadow: 0 4px 16px rgba(212, 165, 116, 0.35);
  }

  .btn-outline {
    background: transparent;
    border: 2px solid var(--primary-light);
    color: var(--primary);
  }

  .btn-small {
    padding: 10px 20px;
    font-size: 14px;
    border-radius: 10px;
  }

  /* ========== 1. 默契大考验 ========== */
  .quiz-intro {
    text-align: center;
    padding: 20px 0;
  }
  .quiz-intro .big-emoji { font-size: 64px; margin-bottom: 16px; }
  .quiz-intro p { color: var(--text-light); line-height: 1.8; }

  .player-select {
    display: flex;
    gap: 12px;
    margin: 20px 0;
  }
  .player-btn {
    flex: 1;
    padding: 16px;
    border-radius: 14px;
    border: 2px solid var(--primary-light);
    background: white;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    text-align: center;
  }
  .player-btn.selected {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;
    border-color: var(--primary);
  }

  .quiz-progress {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
  }
  .quiz-dot {
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: var(--primary-light);
    opacity: 0.3;
    transition: all 0.3s;
  }
  .quiz-dot.done { opacity: 1; background: var(--primary); }
  .quiz-dot.current { opacity: 1; background: var(--gold); }

  .quiz-question {
    font-size: 18px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 24px;
    line-height: 1.6;
  }

  .quiz-options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .quiz-option {
    padding: 16px;
    border-radius: 14px;
    border: 2px solid #f0e0e4;
    background: white;
    font-family: inherit;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.25s;
    text-align: left;
    line-height: 1.5;
  }
  .quiz-option:active { transform: scale(0.98); }
  .quiz-option:hover { border-color: var(--primary-light); }
  .quiz-option.selected {
    border-color: var(--primary);
    background: linear-gradient(135deg, #fff0f3, #fde4e8);
    font-weight: 700;
  }

  .quiz-result {
    text-align: center;
    padding: 20px 0;
  }
  .result-score {
    font-size: 80px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--primary), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
  }
  .result-label {
    font-size: 16px;
    color: var(--text-light);
    margin-top: 8px;
    margin-bottom: 24px;
  }
  .result-message {
    font-size: 16px;
    line-height: 1.8;
    color: var(--text);
    padding: 16px;
    background: linear-gradient(135deg, #fff0f3, #fde8ec);
    border-radius: 14px;
  }

  /* ========== 2. 爱情轮盘 ========== */
  .wheel-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .wheel-wrap {
    position: relative;
    width: 280px;
    height: 280px;
  }

  .wheel {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    position: relative;
    transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
    box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    overflow: hidden;
  }

  .wheel-segment {
    position: absolute;
    width: 0;
    height: 0;
    top: 50%;
    left: 50%;
    transform-origin: 0 0;
  }

  .wheel-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 56px; height: 56px;
    background: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    z-index: 2;
  }

  .wheel-pointer {
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 28px;
    z-index: 3;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
  }

  .wheel-result {
    text-align: center;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wheel-result-text {
    font-size: 20px;
    font-weight: 700;
    color: var(--primary);
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes popIn {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .wheel-custom {
    width: 100%;
  }
  .wheel-custom textarea {
    width: 100%;
    padding: 12px;
    border: 2px solid #f0e0e4;
    border-radius: 12px;
    font-family: inherit;
    font-size: 14px;
    resize: none;
    outline: none;
    transition: border-color 0.3s;
    line-height: 1.6;
  }
  .wheel-custom textarea:focus {
    border-color: var(--primary-light);
  }
  .wheel-custom .hint {
    font-size: 12px;
    color: var(--text-light);
    margin-top: 6px;
  }

  /* ========== 3. 真心话大冒险 ========== */
  .tod-mode-select {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
  }
  .tod-mode-btn {
    flex: 1;
    padding: 14px;
    border-radius: 14px;
    border: 2px solid #f0e0e4;
    background: white;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
    transition: all 0.3s;
  }
  .tod-mode-btn.selected-truth {
    border-color: #7eb8e0;
    background: linear-gradient(135deg, #e8f4fd, #d0ecff);
    color: #3a7ab5;
  }
  .tod-mode-btn.selected-dare {
    border-color: var(--primary);
    background: linear-gradient(135deg, #fff0f3, #fde4e8);
    color: var(--primary-dark);
  }

  .tod-card {
    text-align: center;
    padding: 32px 20px;
  }
  .tod-emoji {
    font-size: 48px;
    margin-bottom: 16px;
  }
  .tod-type {
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }
  .tod-type.truth { color: #7eb8e0; }
  .tod-type.dare { color: var(--primary); }

  .tod-text {
    font-size: 18px;
    font-weight: 700;
    line-height: 1.8;
    margin-bottom: 28px;
    min-height: 54px;
  }

  .tod-actions {
    display: flex;
    gap: 12px;
  }
  .tod-actions .btn {
    flex: 1;
  }

  /* ========== 4. 纪念日倒计时 ========== */
  .countdown-setup {
    text-align: center;
    padding: 20px 0;
  }
  .countdown-setup .big-emoji { font-size: 56px; margin-bottom: 16px; }
  .countdown-setup p { color: var(--text-light); margin-bottom: 20px; }

  .date-input {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 24px;
  }
  .date-input input {
    width: 100px;
    padding: 12px;
    border: 2px solid #f0e0e4;
    border-radius: 12px;
    font-family: inherit;
    font-size: 16px;
    text-align: center;
    outline: none;
    transition: border-color 0.3s;
  }
  .date-input input:focus { border-color: var(--primary-light); }
  .date-input span {
    display: flex;
    align-items: center;
    color: var(--text-light);
    font-size: 14px;
  }

  .countdown-display {
    text-align: center;
    padding: 20px 0;
  }

  .countdown-big-number {
    font-size: 72px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--primary), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
  }
  .countdown-big-label {
    font-size: 18px;
    color: var(--text-light);
    margin-top: 4px;
    margin-bottom: 32px;
  }

  .countdown-details {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 32px;
  }
  .countdown-detail {
    background: linear-gradient(135deg, #fff0f3, #fde8ec);
    border-radius: 14px;
    padding: 16px 8px;
    text-align: center;
  }
  .countdown-detail .num {
    font-size: 28px;
    font-weight: 700;
    color: var(--primary);
  }
  .countdown-detail .unit {
    font-size: 12px;
    color: var(--text-light);
    margin-top: 2px;
  }

  .countdown-date-info {
    font-size: 13px;
    color: var(--text-light);
    text-align: center;
    margin-bottom: 20px;
    line-height: 1.6;
  }

  .countdown-milestones {
    margin-top: 16px;
  }
  .milestone-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 12px;
    text-align: center;
    color: var(--text-light);
  }
  .milestone-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .milestone-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: linear-gradient(135deg, #fff8f0, #fef0e0);
    border-radius: 10px;
    font-size: 13px;
  }
  .milestone-item .mi-icon { font-size: 20px; }
  .milestone-item .mi-text { flex: 1; color: var(--text); }
  .milestone-item .mi-days {
    font-weight: 700;
    color: var(--gold);
    white-space: nowrap;
  }

  /* ========== 5. 情书生成器 ========== */
  .letter-setup {
    padding: 10px 0;
  }
  .letter-input-group {
    margin-bottom: 16px;
  }
  .letter-input-group label {
    display: block;
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--text-light);
  }
  .letter-input-group input,
  .letter-input-group textarea {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #f0e0e4;
    border-radius: 12px;
    font-family: inherit;
    font-size: 15px;
    outline: none;
    transition: border-color 0.3s;
    background: white;
  }
  .letter-input-group input:focus,
  .letter-input-group textarea:focus {
    border-color: var(--primary-light);
  }
  .letter-input-group textarea {
    resize: none;
    line-height: 1.6;
  }

  .letter-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }
  .letter-tag {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--primary-light);
    background: white;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.25s;
    font-family: inherit;
    color: var(--text);
  }
  .letter-tag.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }

  .letter-output {
    text-align: center;
  }
  .letter-paper {
    background: linear-gradient(135deg, #fff9f0, #fff5e8);
    border-radius: var(--radius);
    padding: 32px 24px;
    text-align: left;
    font-size: 16px;
    line-height: 2;
    color: var(--text);
    position: relative;
    border: 1px solid #f0e0c8;
    min-height: 200px;
  }
  .letter-paper::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      transparent,
      transparent 31px,
      #f0e0c8 31px,
      #f0e0c8 32px
    );
    pointer-events: none;
    opacity: 0.4;
  }
  .letter-paper .letter-content {
    position: relative;
    z-index: 1;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .letter-paper .letter-sig {
    text-align: right;
    margin-top: 24px;
    font-style: italic;
    color: var(--primary);
  }

  /* ========== 动画 ========== */
  .fade-in {
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ========== 分享按钮 ========== */
  .share-bar {
    display: flex;
    gap: 12px;
    margin-top: 20px;
  }
  .share-bar .btn {
    flex: 1;
  }

  /* ========== 响应式 ========== */
  @media (max-width: 360px) {
    .home-title { font-size: 26px; }
    .menu-grid { gap: 12px; }
    .menu-item { padding: 20px 12px; }
    .menu-item .icon { font-size: 32px; }
    .wheel-wrap { width: 240px; height: 240px; }
    .countdown-big-number { font-size: 56px; }
  }
</style>
</head>
<body>

<!-- 粒子背景 -->
<div id="particles"></div>

<!-- ========== 首页 ========== -->
<div class="home" id="home">
  <div class="home-icon">💕</div>
  <div class="home-title">我们的小世界</div>
  <div class="home-subtitle">属于两个人的专属游戏空间</div>
  <div class="menu-grid">
    <div class="menu-item" onclick="showPage('quiz')">
      <span class="icon">🧠</span>
      <div class="label">默契考验</div>
      <div class="desc">看看我们有多懂彼此</div>
    </div>
    <div class="menu-item" onclick="showPage('wheel')">
      <span class="icon">🎡</span>
      <div class="label">爱情轮盘</div>
      <div class="desc">今天听谁的</div>
    </div>
    <div class="menu-item" onclick="showPage('tod')">
      <span class="icon">💌</span>
      <div class="label">真心话大冒险</div>
      <div class="desc">更了解你一点</div>
    </div>
    <div class="menu-item" onclick="showPage('countdown')">
      <span class="icon">⏳</span>
      <div class="label">纪念日</div>
      <div class="desc">在一起的每一天</div>
    </div>
    <div class="menu-item" onclick="showPage('letter')" style="grid-column: 1 / -1;">
      <span class="icon">💌</span>
      <div class="label">情书生成器</div>
      <div class="desc">把心意写成文字</div>
    </div>
  </div>
</div>

<!-- ========== 1. 默契大考验 ========== -->
<div class="page" id="page-quiz">
  <div class="page-header">
    <button class="back-btn" onclick="showHome()">←</button>
    <div class="page-title">🧠 默契大考验</div>
  </div>

  <div id="quiz-intro" class="card quiz-intro fade-in">
    <div class="big-emoji">💘</div>
    <p>两个人各自回答同样的问题<br>最后看看你们的答案有多少重合<br><br>游戏规则：<br>先选一个角色开始答<br>答完后换另一个角色答同样的题</p>
  </div>

  <div id="quiz-select" style="display:none;" class="fade-in">
    <div class="player-select">
      <button class="player-btn" id="p1-btn" onclick="selectPlayer(0)">🧑 我</button>
      <button class="player-btn" id="p2-btn" onclick="selectPlayer(1)">🧑‍🦰 Ta</button>
    </div>
    <button class="btn btn-primary" onclick="startQuiz()" style="margin-top:12px;">开始答题 →</button>
  </div>

  <div id="quiz-game" style="display:none;" class="card fade-in">
    <div class="quiz-progress" id="quiz-progress"></div>
    <div class="quiz-question" id="quiz-q"></div>
    <div class="quiz-options" id="quiz-opts"></div>
  </div>

  <div id="quiz-result" style="display:none;" class="card quiz-result fade-in">
    <div class="result-score" id="result-score"></div>
    <div class="result-label">默契指数</div>
    <div class="result-message" id="result-msg"></div>
    <div class="share-bar" style="margin-top:20px;">
      <button class="btn btn-outline btn-small" onclick="resetQuiz()">再来一次</button>
    </div>
  </div>
</div>

<!-- ========== 2. 爱情轮盘 ========== -->
<div class="page" id="page-wheel">

let currentPlayer = 0;
let answers = [[], []];
let quizIndex = 0;
let quizPhase = 'intro'; // intro, select, playing, result

function selectPlayer(p) {
  currentPlayer = p;
  document.getElementById('p1-btn').className = 'player-btn' + (p === 0 ? ' selected' : '');
  document.getElementById('p2-btn').className = 'player-btn' + (p === 1 ? ' selected' : '');
}

function startQuiz() {
  document.getElementById('quiz-intro').style.display = 'none';
  document.getElementById('quiz-select').style.display = 'none';
  document.getElementById('quiz-game').style.display = 'block';
  quizIndex = 0;
  renderQuizProgress();
  renderQuizQuestion();
}

function renderQuizProgress() {
  const c = document.getElementById('quiz-progress');
  c.innerHTML = '';
  for (let i = 0; i < quizData.length; i++) {
    const dot = document.createElement('div');
    dot.className = 'quiz-dot' + (i < quizIndex ? ' done' : '') + (i === quizIndex ? ' current' : '');
    c.appendChild(dot);
  }
}

function renderQuizQuestion() {
  const q = quizData[quizIndex];
  document.getElementById('quiz-q').textContent = `Q${quizIndex + 1}. ${q.q}`;
  const opts = document.getElementById('quiz-opts');
  opts.innerHTML = '';
  q.opts.forEach((o, i) => {
    const btn = document.createElement('button');
    btn.className = 'quiz-option';
    btn.textContent = o;
    btn.onclick = () => answerQuiz(i);
    opts.appendChild(btn);
  });
  renderQuizProgress();
}

function answerQuiz(idx) {
  if (quizPhase === 'waiting') return;

  const opts = document.querySelectorAll('.quiz-option');
  opts[idx].classList.add('selected');

  if (currentPlayer === 0) {
    answers[0][quizIndex] = idx;
    setTimeout(() => {
      opts.forEach(o => o.classList.remove('selected'));
      if (quizIndex < quizData.length - 1) {
        quizIndex++;
        renderQuizQuestion();
      } else {
        // Player 0 done, switch to player 1
        quizIndex = 0;
        currentPlayer = 1;
        alert(`好的 ${document.getElementById('p2-btn').textContent.trim().slice(2)}，现在轮到你了！请把手机交给 Ta。`);
        renderQuizQuestion();
      }
    }, 300);
  } else {
    answers[1][quizIndex] = idx;
    setTimeout(() => {
      opts.forEach(o => o.classList.remove('selected'));
      if (quizIndex < quizData.length - 1) {
        quizIndex++;
        renderQuizQuestion();
      } else {
        // Both done
        showQuizResult();
      }
    }, 300);
  }
}

function showQuizResult() {
  document.getElementById('quiz-game').style.display = 'none';
  document.getElementById('quiz-result').style.display = 'block';

  let matches = 0;
  for (let i = 0; i < quizData.length; i++) {
    if (answers[0][i] === answers[1][i]) matches++;
  }
  const pct = Math.round((matches / quizData.length) * 100);

  document.getElementById('result-score').textContent = pct + '%';

  let msg = '';
  if (pct >= 90) msg = '灵魂伴侣！你们简直是一个人吧！这种默契度太让人羡慕了 💕';
  else if (pct >= 70) msg = '非常默契！你们真的好懂彼此，继续保持这份心意吧 ✨';
  else if (pct >= 50) msg = '还不错哦！有些地方出乎意料的一致，有些地方还有惊喜等着你们发现 🌸';
  else if (pct >= 30) msg = '哇，有好多不一样的答案！但这恰恰说明你们各自独立又互相吸引呀 💗';
  else msg = '哈哈，你们的答案完全不一样！不过这才是最有趣的，说明你们还有很多故事要去发现 🎉';

  document.getElementById('result-msg').textContent =
    `答对了 ${matches}/${quizData.length} 题\n\n${msg}`;
}

// ========== 2. 爱情轮盘 ==========
let wheelDrawn = false;
let wheelSpinning = false;
let wheelAngle = 0;
let currentWheelItems = [];

const defaultWheelColors = [
  '#e8607c', '#f7a8b8', '#d4a574', '#7eb8e0', '#b8d4a0',
  '#d4a0c8', '#f0c87a', '#a0c8d4', '#e8909c', '#c0a8d4'
];

function drawWheel() {
  const canvas = document.getElementById('wheel-canvas');
  const ctx = canvas.getContext('2d');
  const input = document.getElementById('wheel-input').value.trim();
  currentWheelItems = input.split('\n').map(s => s.trim()).filter(Boolean);
  if (currentWheelItems.length < 2) { alert('至少需要2个选项'); return; }

  const w = canvas.width, h = canvas.height;
  const cx = w / 2, cy = h / 2, r = w / 2 - 4;
  const sliceAngle = (2 * Math.PI) / currentWheelItems.length;

  ctx.clearRect(0, 0, w, h);

  currentWheelItems.forEach((item, i) => {
    const startA = i * sliceAngle - Math.PI / 2;
    const endA = startA + sliceAngle;

    // 扇形
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startA, endA);
    ctx.closePath();
    ctx.fillStyle = defaultWheelColors[i % defaultWheelColors.length];
    ctx.fill();
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 2;
    ctx.stroke();

    // 文字
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(startA + sliceAngle / 2);
    ctx.fillStyle = 'white';
    ctx.font = 'bold 13px "Noto Serif SC", serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const maxLen = 8;
    const txt = item.length > maxLen ? item.slice(0, maxLen) + '…' : item;
    const textR = r * 0.65;
    ctx.fillText(txt, textR, 0);
    ctx.restore();
  });

  wheelDrawn = true;
  wheelAngle = 0;
  document.getElementById('wheel-canvas').style.transform = 'rotate(0deg)';
  document.getElementById('wheel-result').innerHTML = '';
}

function spinWheel() {
  if (wheelSpinning) return;
  if (!wheelDrawn) drawWheel();
  wheelSpinning = true;

  const btn = document.getElementById('wheel-spin-btn');
  btn.textContent = '旋转中...';
  btn.disabled = true;
  document.getElementById('wheel-result').innerHTML = '';

  const totalSpin = 360 * (5 + Math.random() * 5);
  wheelAngle = (wheelAngle + totalSpin) % 360;
  document.getElementById('wheel-canvas').style.transform = `rotate(${wheelAngle}deg)`;

  setTimeout(() => {
    const sliceAngle = 360 / currentWheelItems.length;
    // 指针在顶部(0度)，所以要计算实际位置
    const normalizedAngle = (360 - (wheelAngle % 360)) % 360;
    const winnerIdx = Math.floor(normalizedAngle / sliceAngle) % currentWheelItems.length;
    document.getElementById('wheel-result').innerHTML =
      `<div class="wheel-result-text">✨ ${currentWheelItems[winnerIdx]} ✨</div>`;
    wheelSpinning = false;
    btn.textContent = '🎲 再转一次';
    btn.disabled = false;
  }, 4200);
}

let todMode = 'mix';
let todUsed = [];

function setTodMode(mode) {
  todMode = mode;
  document.getElementById('tod-truth-btn').className = 'tod-mode-btn';
  document.getElementById('tod-dare-btn').className = 'tod-mode-btn';
  document.getElementById('tod-mix-btn').className = 'tod-mode-btn';
  if (mode === 'truth') document.getElementById('tod-truth-btn').className = 'tod-mode-btn selected-truth';
  else if (mode === 'dare') document.getElementById('tod-dare-btn').className = 'tod-mode-btn selected-dare';
  else document.getElementById('tod-mix-btn').className = 'tod-mode-btn selected-truth selected-dare';
  nextTod();
}

function nextTod() {
  let isTruth;
  if (todMode === 'truth') isTruth = true;
  else if (todMode === 'dare') isTruth = false;
  else isTruth = Math.random() > 0.5;

  const pool = isTruth ? truths : dares;
  const available = pool.filter((_, i) => !todUsed.includes((isTruth ? 'T' : 'D') + i));
  if (available.length === 0) {
    todUsed = todUsed.filter(t => t[0] !== (isTruth ? 'T' : 'D'));
    return nextTod();
  }
  const rIdx = Math.floor(Math.random() * available.length);
  const origIdx = pool.indexOf(available[rIdx]);
  todUsed.push((isTruth ? 'T' : 'D') + origIdx);

  document.getElementById('tod-emoji').textContent = isTruth ? '💭' : '🔥';
  const typeEl = document.getElementById('tod-type-label');
  typeEl.textContent = isTruth ? '真心话' : '大冒险';
  typeEl.className = 'tod-type ' + (isTruth ? 'truth' : 'dare');
  document.getElementById('tod-text').textContent = available[rIdx];
  document.getElementById('tod-text').style.color = 'var(--text)';
}

function loadCountdown() {
  const saved = localStorage.getItem('couple-countdown-date');
  if (saved) {
    const d = new Date(saved);
    document.getElementById('cd-year').value = d.getFullYear();
    document.getElementById('cd-month').value = d.getMonth() + 1;
    document.getElementById('cd-day').value = d.getDate();
    renderCountdown(d);
  }
}

function startCountdown() {
  const y = parseInt(document.getElementById('cd-year').value);
  const m = parseInt(document.getElementById('cd-month').value);
  const d = parseInt(document.getElementById('cd-day').value);
  if (!y || !m || !d) { alert('请填写完整日期'); return; }

  const date = new Date(y, m - 1, d);
  if (isNaN(date.getTime())) { alert('日期无效'); return; }

  localStorage.setItem('couple-countdown-date', date.toISOString());
  renderCountdown(date);
}

function renderCountdown(startDate) {
  document.getElementById('countdown-setup').style.display = 'none';
  document.getElementById('countdown-display').style.display = 'block';

  const now = new Date();
  const diffMs = now - startDate;
  const totalDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));

  // 年月日拆分
  let years = now.getFullYear() - startDate.getFullYear();
  let months = now.getMonth() - startDate.getMonth();
  let days = now.getDate() - startDate.getDate();
  if (days < 0) { months--; days += 30; }
  if (months < 0) { years--; months += 12; }

  document.getElementById('cd-days').textContent = totalDays.toLocaleString();
  document.getElementById('cd-years').textContent = years;
  document.getElementById('cd-months').textContent = months;
  document.getElementById('cd-days2').textContent = days;

  const opts = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
  document.getElementById('cd-date-info').innerHTML =
    `在一起的日期：${startDate.toLocaleDateString('zh-CN', opts)}<br>已经走过了 ${totalDays.toLocaleString()} 天`;

  // 里程碑
  const milestones = [
    { days: 7, icon: '🌱', text: '第一周' },
    { days: 30, icon: '🌙', text: '满月' },
    { days: 100, icon: '💯', text: '一百天' },
    { days: 365, icon: '🎂', text: '一周年' },
    { days: 520, icon: '💕', text: '520天' },
    { days: 730, icon: '⭐', text: '两周年' },
    { days: 1000, icon: '🏆', text: '一千天' },
    { days: 1461, icon: '💎', text: '四周年' },
  ];

  const mc = document.getElementById('cd-milestones');
  let html = '<div class="milestone-title">🗓️ 里程碑</div><div class="milestone-list">';
  milestones.forEach(m => {
    const reached = totalDays >= m.days;
    const diff = m.days - totalDays;
    html += `<div class="milestone-item" style="${reached ? 'opacity:1' : 'opacity:0.5'}">
      <span class="mi-icon">${m.icon}</span>
      <span class="mi-text">${m.text}（${m.days}天）</span>
      <span class="mi-days">${reached ? '✓ 已达成' : `还差${diff}天`}</span>
    </div>`;
  });
  html += '</div>';
  mc.innerHTML = html;
}

function resetCountdown() {
  localStorage.removeItem('couple-countdown-date');
  document.getElementById('countdown-display').style.display = 'none';
  document.getElementById('countdown-setup').style.display = 'block';
  document.getElementById('cd-year').value = '';
  document.getElementById('cd-month').value = '';
  document.getElementById('cd-day').value = '';
}

(function initTags() {
  const c = document.getElementById('letter-tags');
  letterTags.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'letter-tag';
    btn.textContent = t;
    btn.onclick = () => {

function generateLetter() {
  const name = document.getElementById('letter-name').value.trim() || '你';
  const extra = document.getElementById('letter-extra').value.trim();
  const tags = selectedTags.size > 0 ? [...selectedTags] : letterTags.slice(0, 3);

  let content = `亲爱的${name}：\n\n`;

  // 开头
  const openings = [
    `有些话藏在心里很久了，今天想说给你听。`,
    `写这封信的时候，嘴角不自觉地上扬了。`,
    `不知道从什么时候开始，你成了我最想分享一切的人。`,
    `窗外的风很温柔，让我想到了你。`,
  ];
  content += openings[Math.floor(Math.random() * openings.length)] + '\n\n';

  // 中间 — 从标签中随机选2-3条
  const shuffled = [...tags].sort(() => Math.random() - 0.5).slice(0, Math.min(3, tags.length));
  shuffled.forEach(tag => {
    const pool = letterTemplates[tag];
    if (pool) {
      content += pool[Math.floor(Math.random() * pool.length)] + '\n\n';
    }
  });

  // 想说的话
  if (extra) {
    content += `我还想对你说：${extra}\n\n`;
  }

  // 结尾
  const endings = [
    '这些话可能不够华丽，但每一个字都是真心的。',
    '谢谢你读到这里，就像谢谢你一直在我身边。',
    '千言万语汇成一句话：有你真好。',
  ];
  content += endings[Math.floor(Math.random() * endings.length)];

  document.getElementById('letter-content').textContent = content;
  document.getElementById('letter-sig').textContent = `永远爱你的 💌`;
  document.getElementById('letter-setup').style.display = 'none';
  document.getElementById('letter-output').style.display = 'block';
}

function regenerateLetter() {
  document.getElementById('letter-output').style.display = 'none';
  document.getElementById('letter-setup').style.display = 'block';
}

function copyLetter() {
  const text = document.getElementById('letter-content').textContent +
    '\n\n' + document.getElementById('letter-sig').textContent;
  navigator.clipboard.writeText(text).then(() => {
    alert('已复制到剪贴板 💕');
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('已复制到剪贴板 💕');
  });
}
